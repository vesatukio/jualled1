<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DUTAKITA ELECTRONIC</title>

<meta name="theme-color" content="#1B8F50">
<meta name="description" content="Sparepart Lampu LED, Mesin Cuci, Kulkas dan Elektronik">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<header>

<div class="logo-wrap">
<img src="logo.png" class="logo">
</div>

<div class="search-wrap">
<input
type="text"
id="search"
placeholder="Cari produk..."
onkeyup="searchProduct()">
</div>

<div class="cart-header">
🛒 <span id="cartCount">0</span>
</div>

</header>

<div class="tagline">
Duta LED: Kebutuhan Lampu Anda.
</div>

<div id="products" class="products"></div>

<div class="checkout-bar">
    <div id="cart-summary" style="width: 100%; font-size: 12px; margin-bottom: 5px;">
        </div>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div>
            <div class="checkout-title">Total</div>
            <div id="total">Rp 0</div>
        </div>
        
        <div style="display: flex; gap: 5px;">
            <button id="reset-btn" style="background:#E53935; border:none; color:white; padding:8px 12px; border-radius:20px; font-size:12px;">Reset</button>
            
            <button id="wa-btn" style="background:var(--green); border:none; color:white; padding:8px 12px; border-radius:20px; font-size:12px;">Checkout WA</button>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
