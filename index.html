<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Duta LED Store</title>

    <meta name="theme-color" content="#ff9800">
    <meta name="description" content="Aplikasi katalog dan pemesanan Duta LED Store">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Duta LED">

    <link rel="icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <link rel="stylesheet" href="style.css?v=1">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
    <div class="logo">Duta LED <span id="admin-trigger" style="cursor:pointer">🔒</span></div>
    <input type="text" id="search" placeholder="Cari barang...">
    <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</header>

<div id="category-container" class="category-container"></div>

    <main id="product-grid"></main>

    <div id="cart-box" class="hidden cart-box">

    <h3>🛒 Ringkasan Order</h3>

    <div id="cart-items">
        Keranjang kosong
    </div>

    <div id="cart-total">
        Total: Rp 0
    </div>
<button id="send-wa-btn" onclick="sendOrderWA()">
    Kirim ke WhatsApp
</button>
    <button id="reset-cart-btn" onclick="resetCart()">
        🗑 Hapus Semua
    </button>

</div>

    <nav class="bottom-nav">

    <a href="javascript:void(0)" onclick="goHome()">
        🏠
        <span>Home</span>
    </a>

    <a href="javascript:void(0)" onclick="goKategori()">
        📂
        <span>Kategori</span>
    </a>

    <a href="javascript:void(0)" onclick="goChat()">
        💬
        <span>Chat</span>
    </a>

</nav>
    <script src="app.js"></script>
    <script>
    document.getElementById('admin-trigger').addEventListener('click', () => {
        const password = prompt("Masukkan Password Admin:");
        if (password === "admin123") { // Ganti password sesuai keinginan Anda
            window.location.href = window.location.pathname + "?role=admin";
        }
    });
</script>
    <div id="adminModal" class="hidden" style="position:fixed; top:20%; left:30%; width:40%; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:999;">
    <h3>Edit Stok: <span id="edit-nama-produk"></span></h3>
    <input type="number" id="input-stok-baru" placeholder="Masukkan stok baru" style="width:100%; padding:10px; margin-bottom:10px;">
    
    <button type="button" onclick="saveStock()" style="background:orange; color:white; border:none; padding:10px; width:100%;">Simpan Stok</button>
    <button type="button" onclick="closeModal()" style="margin-top:5px; width:100%;">Batal</button>
</div>
    <script>
function goHome(){
    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}


function goKategori(){

    const kategori = document.getElementById("category-container");

    if(kategori){
        kategori.scrollIntoView({
            behavior:"smooth",
            block:"start"
        });
    }

}


function goChat(){

    // ganti nomor WhatsApp sesuai nomor toko
    const nomor = "6283157925577";

    const pesan = "Halo Duta LED, saya ingin bertanya produk.";

    window.open(
        "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan),
        "_blank"
    );

}
</script>
    <script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js")
        .then(function (registration) {
            console.log("Service Worker aktif:", registration.scope);
        })
        .catch(function (error) {
            console.error("Service Worker gagal:", error);
        });
    });
}
</script>
</body>
</html>
