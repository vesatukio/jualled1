<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duta LED Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <div class="logo">Duta LED <span id="admin-trigger" style="cursor:pointer">🔒</span></div>
        <input type="text" id="search" placeholder="Cari barang...">
        <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
    </header>

    <main id="product-grid"></main>

    <div id="cart-box" class="hidden" style="position:fixed; top:60px; right:10px; background:white; padding:20px; border:1px solid #ddd; z-index:100;">
    <h3>Ringkasan Order</h3>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; margin-top:10px;">Total: Rp 0</div>
</div>

    <nav class="bottom-nav">
        <a href="#">Home</a><a href="#">Kategori</a><a href="#">Chat</a>
    </nav>
    <script src="app.js"></script>
    <script>
    document.getElementById('admin-trigger').addEventListener('click', () => {
        const password = prompt("Masukkan Password Admin:");
        if (password === "admin123") { // Ganti password sesuai keinginan Anda
            window.location.href = window.location.pathname + "?role=admin";
        }
    });
</script>
</body>
</html>
