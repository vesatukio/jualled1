<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --danger-color: #ef4444;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* 1. SEGMEN BARU: TEKS BERJALAN DI HEADER (DI ATAS BANNER) */
        .header-marquee {
            background-color: #1e3a8a;
            color: #ffffff;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #2563eb;
        }

        header {
            background-color: #0b1329;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
        }

        /* 2. SEGMEN BARU: TOMBOL HATI RAHASIA DI KANAN ATAS */
        .secret-heart-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.15; /* Dibuat sangat samar agar tidak terlihat pembeli */
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .secret-heart-btn:active {
            opacity: 1;
            transform: scale(1.2);
        }

        .container {
            max-width: 840px;
            margin: 0 auto;
            padding: 20px;
        }

        .banner-slider {
            width: 100%;
            height: auto;
            aspect-ratio: 840 / 360;
            border-radius: 10px;
            overflow: hidden;
            background-color: var(--card-bg);
            margin-bottom: 20px;
            position: relative;
        }

        .banner-slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .banner-slider img.active {
            display: block;
        }

        .grid-produk {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 80px; /* Jarak agar tidak tertutup navbar bawah */
        }

        .card-produk {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-produk img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .info-produk {
            padding: 12px;
        }

        .nama-produk {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .harga-produk {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 15px;
        }

        .bottom-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #0b1329;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #1e293b;
            z-index: 10;
        }

        .nav-item {
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }

        .nav-item span {
            display: block;
            font-size: 18px;
            margin-bottom: 2px;
        }

        /* 3. SEGMEN BARU: TOMBOL RAHASIA DI NAV BAWAH */
        .secret-bottom-btn {
            opacity: 0.3; /* Terlihat samar seperti tombol menu biasa */
        }

        /* 4. SEGMEN BARU: TOMBOL INSTALL PWA MELAYANG (KANAN TENGAH) */
        .floating-install-btn {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ef4444, #ec4899);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 99;
            display: none; /* Hanya muncul jika browser mendeteksi bisa di-install */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
        }
        .floating-install-btn span {
            font-size: 8px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: -2px;
        }

        /* 5. SEGMEN BARU: BOX POPUP KOTAK PWA */
        .pwa-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(3px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .pwa-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .pwa-box {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .pwa-box h3 { margin: 10px 0; font-size: 18px; }
        .pwa-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        .pwa-btn-group { display: flex; gap: 10px; }
        .pwa-btn {
            flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer;
        }
        .pwa-btn-install { background-color: var(--accent-color); color: #0f172a; }
        .pwa-btn-close { background-color: #334155; color: var(--text-color); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="header-marquee">
        <marquee id="runningTextBeranda" behavior="scroll" direction="left" scrollamount="5">
            Memuat informasi promo berjalan dari database...
        </marquee>
    </div>

    <header>
        <h1>Duta Terang LED</h1>
        
        <button class="secret-heart-btn" id="heartSecretBtn">❤️</button>
    </header>

    <div class="container">
        <div class="banner-slider" id="bannerContainer">
            <div style="text-align: center; padding-top: 15%; color: var(--text-muted);" id="bannerLoader">
                Memuat data banner...
            </div>
        </div>

        <div class="grid-produk" id="tabelProdukBeranda">
            </div>
    </div>

    <div class="bottom-navbar">
        <button class="nav-item" onclick="location.reload()">
            <span>🏠</span>Beranda
        </button>
        
        <button class="nav-item secret-bottom-btn" id="bottomSecretBtn">
            <span>⚙️</span>Sistem
        </button>
        
        <button class="nav-item" onclick="bukaPopupInstalasi()">
            <span>📥</span>Aplikasi
        </button>
    </div>

    <button class="floating-install-btn" id="floatingInstallBtn" onclick="bukaPopupInstalasi()">
        📲
        <span>Ambil</span>
    </button>

    <div class="pwa-overlay" id="pwaOverlay">
        <div class="pwa-box">
            <div style="font-size: 40px;">📲</div>
            <h3>Pasang Aplikasi Resmi?</h3>
            <p>Akses katalog sparepart jadi lebih cepat, ringan, dan hemat kuota langsung dari layar utama HP Anda.</p>
            <div class="pwa-btn-group">
                <button class="pwa-btn pwa-btn-close" onclick="tutupPopupInstalasi()">Batal</button>
                <button class="pwa-btn pwa-btn-install" id="btnEksekusiInstallPWA">Install</button>
            </div>
        </div>
    </div>

<script>
    // Konfigurasi Database Supabase Anda
    const SUPABASE_URL = "https://opgeeqnucxrdqcgwcuge.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wZ2VlcW51Y3hyZHFjZ3djdWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTgzODAsImV4cCI6MjA5NDU5NDM4MH0.yT10QOFErxHbTL8X-QOUQ8EydcJuLpStCbd8ucfTJr8";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Variabel Deteksi Rahasia
    let klikAtas = 0, klikBawah = 0;
    let timerAtas, timerBawah;

    window.onload = () => {
        muatRunningText();
        muatBannerSesuaiDatabase();
        muatKatalogBarang();
        aktifkanSistemTombolRahasia();
    };

    // --- LOGIKA MENAMPILKAN DATA ORIGINAL ---

    async function muatRunningText() {
        try {
            let { data } = await _supabase.from('pengaturan').select('running_text').eq('id', 1).single();
            if (data && data.running_text) {
                document.getElementById('runningTextBeranda').innerText = data.running_text;
            }
        } catch (e) { console.log(e); }
    }

    async function muatBannerSesuaiDatabase() {
        try {
            let { data: banners } = await _supabase.from('banners').select('*').eq('aktif', true).order('urutan', { ascending: true });
            if (!banners || banners.length === 0) {
                document.getElementById('bannerContainer').innerHTML = "<div style='padding:20px; text-align:center;'>Tidak ada banner.</div>";
                return;
            }
            let html = "";
            banners.forEach((b, index) => {
                html += `<img src="${b.image_url}" class="${index === 0 ? 'active' : ''}">`;
            });
            document.getElementById('bannerContainer').innerHTML = html;
            if(banners.length > 1) jalankanSliderOtomatis();
        } catch (e) { console.log(e); }
    }

    function jalankanSliderOtomatis() {
        setInterval(() => {
            const wadah = document.getElementById('bannerContainer');
            const listImg = wadah.querySelectorAll('img');
            let indexAktif = Array.from(listImg).findIndex(img => img.classList.contains('active'));
            listImg[indexAktif].classList.remove('active');
            let indexBerikutnya = (indexAktif + 1) % listImg.length;
            listImg[indexBerikutnya].classList.add('active');
        }, 4000);
    }

    async function muatKatalogBarang() {
        try {
            let { data: produk } = await _supabase.from('produk').select('*').order('id', { ascending: false });
            let html = "";
            produk.forEach(p => {
                html += `
                    <div class="card-produk">
                        <img src="${p.gambar1 || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="info-produk">
                            <div class="nama-produk">${p.nama}</div>
                            <div class="harga-produk">Rp ${(Number(p.harga)||0).toLocaleString('id-ID')}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('tabelProdukBeranda').innerHTML = html;
        } catch (e) { console.log(e); }
    }

    // --- LOGIKA TOMBOL RAHASIA (KETUK 5 KALI CEPAT) ---

    function aktifkanSistemTombolRahasia() {
        // Klik Rahasia Atas (Hati)
        document.getElementById('heartSecretBtn').addEventListener('click', () => {
            klikAtas++;
            clearTimeout(timerAtas);
            if (klikAtas >= 5) {
                klikAtas = 0;
                bukaHalamanAdmin();
            }
            timerAtas = setTimeout(() => { klikAtas = 0; }, 2000);
        });

        // Klik Rahasia Bawah (Sistem)
        document.getElementById('bottomSecretBtn').addEventListener('click', () => {
            klikBawah++;
            clearTimeout(timerBawah);
            if (klikBawah >= 5) {
                klikBawah = 0;
                bukaHalamanAdmin();
            }
            timerBawah = setTimeout(() => { klikBawah = 0; }, 2000);
        });
    }

    function bukaHalamanAdmin() {
        alert("Akses Admin Terdeteksi. Menuju halaman admin...");
        window.location.href = "admin.html";
    }

    // --- LOGIKA PWA INSTALASI POPUP & FLOATING BUTTON ---

    let tangkapanPromptPWA;
    const tombolMelayang = document.getElementById('floatingInstallBtn');
    const overlayPopup = document.getElementById('pwaOverlay');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        tangkapanPromptPWA = e;
        
        // Munculkan tombol melayang kanan tengah jika PWA siap pasang
        tombolMelayang.style.display = 'flex';
    });

    function bukaPopupInstalasi() {
        if (!tangkapanPromptPWA) {
            alert("Aplikasi sudah terpasang atau browser Anda tidak mendukung instalasi otomatis.");
            return;
        }
        overlayPopup.classList.add('show');
    }

    function tutupPopupInstalasi() {
        overlayPopup.classList.remove('show');
    }

    document.getElementById('btnEksekusiInstallPWA').addEventListener('click', async () => {
        if (tangkapanPromptPWA) {
            tutupPopupInstalasi();
            tangkapanPromptPWA.prompt();
            const { outcome } = await tangkapanPromptPWA.userChoice;
            if (outcome === 'accepted') {
                tombolMelayang.style.display = 'none';
            }
            tangkapanPromptPWA = null;
        }
    });

    window.addEventListener('appinstalled', () => {
        tombolMelayang.style.display = 'none';
        tutupPopupInstalasi();
    });
</script>
</body>
</html>
