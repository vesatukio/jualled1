<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duta Terang LED</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="produk-grid">
        <div class="card">
            <div class="card-container">
                <span class="discount-badge">-5%</span>
                <img src="produk1.jpg" alt="Produk">
            </div>
            <div class="card-body">
                <div class="card-title">LED AC FPL 5w D39.6</div>
                <div class="price-container">
                    <span class="old-price">Rp 4.200</span>
                    <span class="final-price">Rp 3.990</span>
                </div>
                <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                    <input type="text" class="qty-input" value="0" readonly>
                    <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
                </div>
            </div>
        </div>
        </div>

    <div id="floating-cart">
        <div>
            <div style="font-size:12px; color:#666;">Total Belanja:</div>
            <div id="total-harga" style="font-size:18px; font-weight:700; color:#ee4d2d;">Rp 0</div>
        </div>
        <button onclick="sendToWhatsApp()" class="checkout-btn">Checkout WA</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
