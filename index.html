<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duta Terang LED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --pink: #ff477e;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding-bottom: 240px;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        
        /* Product Layout */
        .grid-produk { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { 
            background: #fff; border-radius: 12px; padding: 8px; 
            border: 1px solid #e2e8f0; position: relative; 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .img-container { position: relative; width: 100%; height: 130px; border-radius: 8px; overflow: hidden; }
        .prod-img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        
        /* Badges & Actions */
        .discount-badge {
            position: absolute; top: 5px; right: 5px; background: var(--pink);
            color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px;
        }
        .share-btn {
            position: absolute; top: 5px; left: 5px; background: rgba(255,255,255,0.85);
            border: none; width: 28px; height: 28px; border-radius: 50%; color: #475569;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px;
        }

        /* Pricing Box */
        .price-box { margin: 6px 0; }
        .price-now { font-weight: bold; color: var(--pink); font-size: 15px; display: block; }
        .price-was { font-size: 11px; color: #94a3b8; text-decoration: line-through; }

        /* Counter Actions */
        .order-control { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 4px; }
        .btn-qty { background: #e2e8f0; border: none; width: 28px; height: 28px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-qty:hover { background: #cbd5e1; }
        .qty-indicator { font-weight: bold; font-size: 14px; }
        .btn-beli-init { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; font-size: 12px; }

        /* Bottom Fixed Checkout Panel */
        .checkout-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.15); border-top-left-radius: 16px; border-top-right-radius: 16px;
            padding: 15px; z-index: 1000;
        }
        .checkout-container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .panel-left, .panel-right { display: flex; flex-direction: column; gap: 8px; }
        .panel-right { border-left: 1px solid #e2e8f0; padding-left: 15px; }
        
        .input-buyer { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
        .summary-list { max-height: 80px; overflow-y: auto; font-size: 12px; color: #475569; margin: 0; padding-left: 18px; }
        .total-box { font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; border-top: 1px dashed #cbd5e1; padding-top: 5px; }
        
        .btn-wa { background: #16a34a; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; text-align: center; font-size: 14px; }
        .btn-reset { background: #94a3b8; color: white; border: none; padding: 6px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: center;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div id="cat-bar" style="display:flex; gap:5px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
    
    <div class="grid-produk" id="list">
        <p style="text-align:center; grid-column: span 2;">Memuat produk...</p>
    </div>
</div>

<div class="checkout-panel">
    <div class="checkout-container">
        <div class="panel-left">
            <input type="text" id="buyer-nama" class="input-buyer" placeholder="Nama Lengkap Pemesan">
            <input type="text" id="buyer-alamat" class="input-buyer" placeholder="Alamat Pengiriman Ringkas">
            <button class="btn-reset" onclick="resetKeranjang()"><i class="fa-solid fa-trash"></i> Reset Orderan</button>
        </div>
        <div class="panel-right">
            <div style="font-weight: bold; font-size: 13px; color: var(--primary);">📋 Ringkasan Belanja:</div>
            <ul id="summary-items" class="summary-list">
                <li style="list-style: none; margin-left: -15px; color:#94a3b8;">Belum ada item dipilih</li>
            </ul>
            <div class="total-box">
                <span>Total:</span>
                <span id="summary-total" style="color: var(--pink);">Rp 0</span>
            </div>
            <button class="btn-wa" onclick="kirimKeWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Kirim ke WA</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://opgeeqnucxrdqcgwcuge.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wZ2VlcW51Y3hyZHFjZ3djdWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTgzODAsImV4cCI6MjA5NDU5NDM4MH0.yT10QOFErxHbTL8X-QOUQ8EydcJuLpStCbd8ucfTJr8"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let produkData = [];
    let keranjang = {}; // Format: { prod_id: kuantitas }

    document.addEventListener("DOMContentLoaded", async () => {
        await muatProduk();
    });

    async function muatProduk() {
        try {
            let { data: produk, error } = await _supabase.from('produk').select('*').order('id', { ascending: false });
            if (error) throw error;
            if (produk) {
                produkData = produk;
                const kategoriUnik = ['Semua', ...new Set(produk.map(p => p.kategori).filter(Boolean))];
                renderKategoriBar(kategoriUnik);
                renderDaftarProduk('Semua');
            }
        } catch (err) {
            document.getElementById('list').innerHTML = `<p style="grid-column:span 2;text-align:center;color:red;">Gagal sinkronisasi data.</p>`;
        }
    }

    function renderKategoriBar(kategoriArr) {
        const catBar = document.getElementById('cat-bar');
        catBar.innerHTML = '';
        kategoriArr.forEach((kat, idx) => {
            const btn = document.createElement('button');
            btn.innerText = kat;
            btn.style.cssText = `padding:6px 12px; border-radius:12px; border:none; font-weight:bold; background:${idx===0?'var(--primary)':'#e2e8f0'}; color:${idx===0?'white':'#333'}; cursor:pointer; white-space:nowrap;`;
            btn.onclick = () => {
                renderDaftarProduk(kat);
            };
            catBar.appendChild(btn);
        });
    }

    function renderDaftarProduk(filterKategori) {
        const listContainer = document.getElementById('list');
        listContainer.innerHTML = '';
        
        const filtered = filterKategori === 'Semua' ? produkData : produkData.filter(p => p.kategori === filterKategori);

        filtered.forEach(p => {
            const qty = keranjang[p.id] || 0;
            const diskon = Number(p.diskon) || 0;
            const hargaAsli = Number(p.harga) || 0;
            
            // Hitung Rumus Harga Coret Matematika Formal:
            // $HargaAkhir = HargaAsli \times (1 - \frac{Diskon}{100})$
            const hargaFinal = diskon > 0 ? hargaAsli * (1 - (diskon / 100)) : hargaAsli;
            const imgUrl = p.gambar1 || 'https://via.placeholder.com/150';

            const itemHtml = `
                <div class="product-card">
                    <div class="img-container">
                        <button class="share-btn" onclick="shareProduk('${p.nama}', ${hargaFinal}, '${imgUrl}')" title="Share Produk"><i class="fa-solid fa-share-nodes"></i></button>
                        ${diskon > 0 ? `<div class="discount-badge">-${diskon}%</div>` : ''}
                        <img src="${imgUrl}" class="prod-img" onclick="zoomGambar('${imgUrl}')">
                    </div>
                    <h4 style="margin:6px 0 2px; font-size:13px; color:#333; line-height:1.3;">${p.nama}</h4>
                    <p style="margin:0 0 6px; font-size:10px; color:#64748b;">Stok: ${p.stok || 0}</p>
                    
                    <div class="price-box">
                        <span class="price-now">Rp ${hargaFinal.toLocaleString('id-ID')}</span>
                        ${diskon > 0 ? `<span class="price-was">Rp ${hargaAsli.toLocaleString('id-ID')}</span>` : ''}
                    </div>

                    <div class="order-control" id="ctrl-${p.id}">
                        ${qty === 0 ? 
                            `<button class="btn-beli-init" onclick="ubahQty(${p.id}, 1)">+ Keranjang</button>` : 
                            `<button class="btn-qty" onclick="ubahQty(${p.id}, -1)">-</button>
                             <span class="qty-indicator">${qty}</span>
                             <button class="btn-qty" onclick="ubahQty(${p.id}, 1)">+</button>`
                        }
                    </div>
                </div>
            `;
            listContainer.insertAdjacentHTML('beforeend', itemHtml);
        });
    }

    function ubahQty(id, delta) {
        const p = produkData.find(item => item.id === id);
        if(!p) return;
        
        let currentQty = keranjang[id] || 0;
        currentQty += delta;

        if (currentQty <= 0) {
            delete keranjang[id];
        } else {
            if(currentQty > p.stok) {
                alert(`Stok terbatas! Maksimal pembelian ${p.stok} pcs.`);
                return;
            }
            keranjang[id] = currentQty;
        }
        
        renderDaftarProduk('Semua');
        hitungUlangCheckout();
    }

    function hitungUlangCheckout() {
        const summaryList = document.getElementById('summary-items');
        const summaryTotal = document.getElementById('summary-total');
        summaryList.innerHTML = '';
        
        let totalBiaya = 0;
        let hasItem = false;

        for (const id in keranjang) {
            const p = produkData.find(item => item.id == id);
            if(p) {
                hasItem = true;
                const diskon = Number(p.diskon) || 0;
                const hargaFinal = diskon > 0 ? p.harga * (1 - (diskon / 100)) : p.harga;
                const subTotal = hargaFinal * keranjang[id];
                totalBiaya += subTotal;

                summaryList.innerHTML += `<li>${p.nama} (x${keranjang[id]}) - Rp ${subTotal.toLocaleString('id-ID')}</li>`;
            }
        }

        if(!hasItem) {
            summaryList.innerHTML = `<li style="list-style: none; margin-left:-15px; color:#94a3b8;">Belum ada item dipilih</li>`;
        }
        summaryTotal.innerText = `Rp ${totalBiaya.toLocaleString('id-ID')}`;
    }

    function resetKeranjang() {
        keranjang = {};
        renderDaftarProduk('Semua');
        hitungUlangCheckout();
    }

    // FITUR SHARE SEO & LINK GAMBAR HARGA
    function shareProduk(nama, harga, linkGambar) {
        const textShare = `Beli ${nama} dengan harga terbaik Rp ${harga.toLocaleString('id-ID')} hanya di Duta Terang LED. Cek gambar speknya disini: ${linkGambar}`;
        if (navigator.share) {
            navigator.share({ title: nama, text: textShare, url: window.location.href });
        } else {
            navigator.clipboard.writeText(textShare + " " + window.location.href);
            alert("Teks info produk & gambar berhasil disalin ke clipboard!");
        }
    }

    // CHECKOUT INTEGRASI WA
    function kirimKeWhatsApp() {
        const nama = document.getElementById('buyer-nama').value.trim();
        const alamat = document.getElementById('buyer-alamat').value.trim();

        if(!nama || !alamat) {
            alert("Nama Lengkap dan Alamat Pengiriman wajib diisi!");
            return;
        }

        let rincianBarang = "";
        let totalAkhir = 0;
        let index = 1;

        for (const id in keranjang) {
            const p = produkData.find(item => item.id == id);
            if(p) {
                const diskon = Number(p.diskon) || 0;
                const hargaFinal = diskon > 0 ? p.harga * (1 - (diskon / 100)) : p.harga;
                const sub = hargaFinal * keranjang[id];
                totalAkhir += sub;
                
                rincianBarang += `${index}. ${p.nama} (x${keranjang[id]}) = Rp ${sub.toLocaleString('id-ID')}\n`;
                index++;
            }
        }

        if(totalAkhir === 0) {
            alert("Keranjang belanja Anda masih kosong!");
            return;
        }

        const nomorWA = "628xxxxxxxxx"; // GANTI DENGAN NOMOR WHATSAPP TOKO ANDA (Awali angka 62)
        const templatePesan = `*PESANAN BARU - DUTA TERANG LED*\n\n` +
                              `👤 *Nama:* ${nama}\n` +
                              `📍 *Alamat:* ${alamat}\n\n` +
                              `📦 *Daftar Belanjaan:*\n${rincianBarang}\n` +
                              `💰 *Total Bayar:* *Rp ${totalAkhir.toLocaleString('id-ID')}*\n\n` +
                              `Mohon segera diproses ya Admin, Terima Kasih!`;

        const tautanWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(templatePesan)}`;
        window.open(tautanWA, '_blank');
    }
</script>
</body>
</html>
