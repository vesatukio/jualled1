<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUTA TERANG - Katalog Sparepart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/public.css">
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">DUTA TERANG</div>
        <input type="text" id="searchPublic" placeholder="Cari barang..." onkeyup="Public.cari()">
    </header>

    <!-- Kategori -->
    <div class="kategori-scroll">
        <button onclick="Public.filter('Semua')">Semua</button>
        <button onclick="Public.filter('LED')">LED</button>
        <button onclick="Public.filter('Audio')">Audio</button>
    </div>

    <!-- Grid Produk -->
    <main id="productGrid" class="product-grid">
        <p>Memuat produk...</p>
    </main>

    <!-- Tombol Admin Rahasia -->
    <footer style="text-align: center; padding: 20px;">
        <button onclick="bukaAdmin()" style="background:none; border:none; color:#ccc;">.</button>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/public.js"></script>
    <script>
        function bukaAdmin() {
            const pass = prompt("Password Admin:");
            if (pass === "admin123") window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
