<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="logo">Duta LED</div>
        <input type="text" class="search-bar" placeholder="Sarat belanja...">
        <div class="cart-info">🛒 Keranjang (1)</div>
    </header>

    <div class="produk-grid" id="produk-container"></div>

            <h2 id="total-harga">Rp 0</h2>
        </div>
        <button class="checkout-wa" onclick="checkoutWA()">Checkout WA</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
