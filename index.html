<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUTAKITA ELECTRONIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="main-header">
    <div class="logo-admin" onclick="aksesAdmin()">⚙️</div>
    <input type="text" id="search" placeholder="Cari sparepart...">
    <div class="cart-icon" onclick="window.location.href='keranjang.html'">🛒<span id="cart-count">0</span></div>
</header>

<div class="kategori-container" id="kategori-list"></div>

<main id="product-list" class="product-grid"></main>

    <nav class="bottom-nav">
        <div class="nav-item">🏠<span>Home</span></div>
        <div class="nav-item" onclick="toggleModal(true)">📋<span>Kategori</span></div>
        <div class="nav-item">🛒<span id="cart-count">0</span></div>
    </nav>

    <script src="app.js"></script>
    <script>
    // Pastikan kode ini berjalan segera setelah halaman dimuat
    document.addEventListener("DOMContentLoaded", function() {
        const products = JSON.parse(localStorage.getItem('allProducts')) || [];
        const container = document.getElementById('product-list'); // Sesuaikan ID dengan elemen di index.html Anda

        if (products.length === 0) {
            container.innerHTML = "<p>Belum ada produk yang tersedia.</p>";
        } else {
            container.innerHTML = products.map(p => `
    <div class="card" style="border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
        <img src="${p.gambar || 'placeholder.jpg'}" 
             alt="${p.nama}" 
             style="width: 100%; height: 150px; object-fit: cover; border-radius: 5px;">
        
        <h4>${p.nama}</h4>
        
        <p>Harga: Rp ${parseInt(p.hargaJual || 0).toLocaleString()}</p>
        
        <p>Stok: ${p.stok || 0}</p>
    </div>
`).join('');
        }
    });
</script>
</body>
</html>
