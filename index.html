<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUTAKITA ELECTRONIC | Sparepart Elektronik Terlengkap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <div class="logo">DUTAKITA ELECTRONIC</div>
        <input type="text" id="search" placeholder="Cari sparepart...">
        <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
    </header>

    <section class="banner">
        <img src="assets/banner.jpg" alt="Promo">
    </section>

    <nav class="kategori">
        <button onclick="filterProduk('Semua')">Semua</button>
        <button onclick="filterProduk('LED')">LED</button>
        <button onclick="filterProduk('Mesin Cuci')">Mesin Cuci</button>
    </nav>

    <main id="product-list" class="product-grid"></main>

    <script src="app.js"></script>
</body>
</html>
