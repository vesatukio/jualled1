<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duta Terang LED</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">Duta Terang LED</div>
        <input type="text" class="search-bar" placeholder="Sarat belanja...">
        <div class="cart-icon">🛒 Keranjang (1)</div>
    </header>

    <div class="produk-grid" id="produk-container">
        </div>

    <div class="floating-checkout">
        <div class="total-info">
            <p>Keranjang & Checkout</p>
            <p>Total Belanja:</p>
            <h2 id="total-harga">Rp 0</h2>
        </div>
        <button class="checkout-wa" onclick="checkoutWA()">WhatsApp Checkout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
