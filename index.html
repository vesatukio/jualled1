<!DOCTYPE html>

<div class="app-container">

    <div class="container">
        <!-- Banner Wrapper Bergulir + Didalamnya ada Kotak Pencarian Manual -->

            <!-- Posisi Kotak Pencarian Tepat di Tengah Gambar Banner -->

        </div>
        
        <!-- Bar Kategori Berjalan Samping (Rapat & Scrollable) -->
        <div class="cat-container" id="cat-bar"></div>

        <!-- Dropdown Filter Pengurutan -->
        <div class="filter-container">
            <select id="sort-box" class="filter-select" onchange="jalankanFilterDanSortir()">

                <option value="termahal">Harga: Termahal</option>
                <option value="terlaris">Terlaris (Stok Terbanyak)</option>
            </select>
        </div>
        
        <!-- Grid Daftar Produk -->
        <div class="grid-produk" id="list">
            <p style="text-align:center; grid-column: span 2; color:#64748b; font-size:13px; padding:20px;">Menyelaraskan etalase toko...</p>
        </div>
    </div>
<div class="grid-produk" id="list">
        <p style="text-align:center; grid-column: span 2; color:#64748b; font-size:13px; padding:20px;">Menyelaraskan etalase toko...</p>
    </div>

    <div id="checkout-container" class="checkout-wrapper">
        <div class="panel-left">
            <h3>Data Pengiriman</h3>
            <input type="text" id="buyer-nama" class="input-buyer" placeholder="Nama Pemesan" oninput="simpanDataDiri()">
            <input type="text" id="buyer-wa" class="input-buyer" placeholder="Nomor WhatsApp" oninput="simpanDataDiri()">
            <textarea id="buyer-alamat" class="input-buyer" rows="2" placeholder="Alamat Lengkap" oninput="simpanDataDiri()"></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <input type="text" id="buyer-rt" class="input-buyer" placeholder="RT/RW" oninput="simpanDataDiri()">
                <input type="text" id="buyer-kodepos" class="input-buyer" placeholder="Kode Pos" oninput="simpanDataDiri()">
            </div>
            <input type="text" id="buyer-kec" class="input-buyer" placeholder="Kecamatan" oninput="simpanDataDiri()">
            <input type="text" id="buyer-kab" class="input-buyer" placeholder="Kabupaten/Kota" oninput="simpanDataDiri()">
            <input type="text" id="buyer-prov" class="input-buyer" placeholder="Provinsi" oninput="simpanDataDiri()">
            
            <button class="btn-reset" onclick="resetDataDiri()"><i class="fa-solid fa-arrow-rotate-left"></i> Kosongkan Data</button>
        </div>

        <div id="checkout-kasir" class="panel-right hidden">
            <h3>🛒 Ringkasan Pesanan</h3>

            </div>

        </div>
    </div>

    <div class="nav-bottom">

        <button class="nav-item" onclick="pindahTab('panduan')"><i class="fa-solid fa-book-open"></i>Panduan</button>
    </div>
</div> ```

### Tambahan Fungsi JS (Agar `resetDataDiri` bekerja)
Pastikan fungsi ini ada di dalam `<script>` Anda:

```javascript
function resetDataDiri() {
    // Daftar semua ID input
    const fields = ['nama', 'wa', 'alamat', 'rt', 'kodepos', 'kec', 'kab', 'prov'];
    fields.forEach(field => {
        const el = document.getElementById(`buyer-${field}`);
        if (el) el.value = '';
    });
    localStorage.removeItem('duta_data_pembeli');
    alert("Data berhasil dikosongkan!");
}
   
</body>
</html>
