<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Keuntungan Restock - Duta Terang</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .container-katalog {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 15px;
        }
        .judul-katalog {
            color: #333;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wrapper-tabel {
            overflow-x: auto;
        }
        .tabel-data {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tabel-data th {
            background-color: #2c3e50;
            color: white;
            text-align: left;
            padding: 12px;
            font-size: 13px;
        }
        .tabel-data td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
            color: #444;
        }
        .tabel-data tr:hover {
            background-color: #f9f9f9;
        }
        .text-center { text-align: center !important; }
        .text-right { text-align: right !important; }
        .badge-untung {
            background-color: #2e7d32;
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }
        #status-akses {
            text-align: center;
            padding: 30px;
        }
        .pesan-error {
            color: #c0392b;
            font-weight: bold;
            background-color: #fde8e8;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #f8b4b4;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-kembali {
            background-color: #64748b;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container-katalog">
    <div class="judul-katalog">
    <div>
        <h2>Analisis Harga & Keuntungan (Duta Terang)</h2>
        
        <select id="pilih-admin" onchange="muatKatalogKeuntungan()" style="padding: 8px; border-radius: 4px; margin-top: 10px; width: 100%; max-width: 300px;">
            <option value="">-- Pilih Admin --</option>
        </select>
    </div>
    
    <a href="https://dutaled.my.id/admin" class="btn-kembali">⬅️ Kembali ke Admin</a>
</div>

<div id="status-akses" style="margin-top: 20px; font-style: italic;">
    Memeriksa verifikasi hak akses admin...
</div>
    
    <div class="wrapper-tabel" id="konten-admin" style="display: none;">
        <table class="tabel-data">
            <thead>
                <tr>
                    <th>Tanggal Restock</th>
                    <th>Nama Produk</th>
                    <th class="text-right">Harga Beli (Modal)</th>
                    <th class="text-right">Harga Jual Toko</th>
                    <th class="text-center">Potongan Diskon</th>
                    <th class="text-right">Estimasi Untung / Pcs</th>
                    <th class="text-center">Status Order</th>
                </tr>
            </thead>
            <tbody id="list-order-supplier">
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://opgeeqnucxrdqcgwcuge.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wZ2VlcW51Y3hyZHFjZ3djdWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTgzODAsImV4cCI6MjA5NDU5NDM4MH0.yT10QOFErxHbTL8X-QOUQ8EydcJuLpStCbd8ucfTJr8';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Fungsi untuk mengisi dropdown admin
    async function isiDropdownAdmin() {
        const select = document.getElementById("pilih-admin");
        try {
            const { data, error } = await supabaseClient
                .from('akses_admin')
                .select('username')
                .order('username');
            if (error) throw error;

            select.innerHTML = '<option value="">-- Semua Admin --</option>';
            data.forEach(acc => {
                select.innerHTML += `<option value="${acc.username}">${acc.username.toUpperCase()}</option>`;
            });

            const adminTersimpan = localStorage.getItem('duta_admin_name');
            if (adminTersimpan) select.value = adminTersimpan;
        } catch (e) {
            console.error("Gagal isi dropdown:", e.message);
        }
    }

    // 2. Fungsi utama muat data (termasuk filter)
    async function muatKatalogKeuntungan() {
        const infoAkses = document.getElementById('status-akses');
        const kontenAdmin = document.getElementById('konten-admin');
        const adminTerpilih = document.getElementById("pilih-admin").value;
        const tbody = document.getElementById('list-order-supplier');

        infoAkses.innerText = "Memuat data...";
        
        try {
            // Query dengan filter admin (jika ada)
            let query = supabaseClient
                .from('order_supplier')
                .select(`
                    id, qty_order, harga_beli_satuan, status_order, created_at,
                    produk ( nama, harga, diskon, pemilik )
                `)
                .order('created_at', { ascending: false });

            if (adminTerpilih) {
                query = query.eq('produk.pemilik', adminTerpilih);
            }

            const { data: orders, error: dbError } = await query;
            if (dbError) throw dbError;

            tbody.innerHTML = '';
            if (orders && orders.length > 0) {
                orders.forEach(order => {
                    const hBeli = order.harga_beli_satuan || 0;
                    const hJual = order.produk?.harga || 0;
                    const diskon = order.produk?.diskon || 0;
                    const hJualNet = hJual - (hJual * (diskon / 100));
                    const untung = hJualNet - hBeli;

                    tbody.innerHTML += `<tr>
                        <td>${new Date(order.created_at).toLocaleDateString()}</td>
                        <td><b>${order.produk?.nama || 'Produk Tanpa Nama'}</b></td>
                        <td class="text-right">Rp ${hBeli.toLocaleString()}</td>
                        <td class="text-right">Rp ${hJualNet.toLocaleString()}</td>
                        <td class="text-center">${diskon}%</td>
                        <td class="text-right"><b style="color:green;">Rp ${untung.toLocaleString()}</b></td>
                        <td class="text-center">${order.status_order}</td>
                    </tr>`;
                });
                infoAkses.style.display = 'none';
                kontenAdmin.style.display = 'block';
            } else {
                infoAkses.innerText = 'Data tidak ditemukan.';
            }
        } catch (error) {
            infoAkses.innerHTML = `<div class="pesan-error">Error: ${error.message}</div>`;
        }
    }

    // 3. Inisialisasi
    document.addEventListener('DOMContentLoaded', async () => {
        await isiDropdownAdmin();
        await muatKatalogKeuntungan();
    });
</script>
</body>
</html>
