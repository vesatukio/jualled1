<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Katalog Produk - Duta Terang</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    .container-katalog { font-family: 'Segoe UI', sans-serif; max-width: 1200px; margin: 10px auto; padding: 10px; }
    .tabel-data { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .tabel-data th { background-color: #2c3e50; color: white; padding: 10px; font-size: 12px; }
    .tabel-data td { padding: 8px; border-bottom: 1px solid #eee; }
    
    /* Menghilangkan kotak input */
    .tabel-data input {
        border: none;
        background: transparent;
        width: 100%;
        text-align: center;
        color: #333;
    }
    .tabel-data input:focus { background: #f0f7ff; outline: none; border-radius: 4px; }
    
    .text-right input { text-align: right; }
    .text-left input { text-align: left; }
    
    /* Tombol Hapus lebih kecil di HP */
    button { padding: 4px 8px; cursor: pointer; border: none; background: #fee2e2; color: #dc2626; border-radius: 4px; }
</style>

<tbody id="list-produk">
    // Contoh:
    <td><input type="text" class="text-left" value="${p.nama}" onchange="updateData(${p.id}, 'nama', this.value)"></td>
    <td class="text-right"><input type="number" class="text-right" value="${hBeli}" onchange="updateData(${p.id}, 'harga_beli', this.value)"></td>
    // ... dst
</tbody>
</head>
<body>

<div class="container-katalog">
    <div class="judul-katalog">
        <div>
            <h2>Data Produk & Keuntungan</h2>
            <select id="pilih-admin" onchange="muatKatalogProduk()" style="padding: 8px; border-radius: 4px; margin-top: 10px; width: 100%; max-width: 300px;">
                <option value="">-- Semua Admin --</option>
            </select>
        </div>
        <a href="https://dutaled.my.id/admin" class="btn-kembali">⬅️ Kembali ke Admin</a>
    </div>

    <div id="status-akses" style="margin-top: 20px; font-style: italic;">Memuat data...</div>
    
    <div class="wrapper-tabel" id="konten-admin" style="display: none;">
        <table class="tabel-data">
            <thead>
                <tr>
                    <th>Nama Produk</th>
                    <th class="text-right">Harga Beli</th>
                    <th class="text-right">Harga Jual</th>
                    <th class="text-center">Diskon (%)</th>
                    <th class="text-right">Estimasi Untung</th>
                    <th class="text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="list-produk"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://opgeeqnucxrdqcgwcuge.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wZ2VlcW51Y3hyZHFjZ3djdWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTgzODAsImV4cCI6MjA5NDU5NDM4MH0.yT10QOFErxHbTL8X-QOUQ8EydcJuLpStCbd8ucfTJr8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function isiDropdownAdmin() {
        const select = document.getElementById("pilih-admin");
        try {
            const { data, error } = await supabaseClient.from('akses_admin').select('username').order('username');
            if (error) throw error;
            select.innerHTML = '<option value="">-- Semua Admin --</option>';
            data.forEach(acc => {
                select.innerHTML += `<option value="${acc.username}">${acc.username.toUpperCase()}</option>`;
            });
            const adminTersimpan = localStorage.getItem('duta_admin_name');
            if (adminTersimpan) select.value = adminTersimpan;
        } catch (e) { console.error("Gagal isi dropdown:", e.message); }
    }

    async function updateData(id, kolom, nilai) {
        try {
            const nilaiUpdate = (kolom !== 'nama') ? Number(nilai) : nilai;
            const { error } = await supabaseClient.from('produk').update({ [kolom]: nilaiUpdate }).eq('id', id);
            if (error) throw error;
            await muatKatalogProduk();
        } catch (error) { alert("Gagal menyimpan: " + error.message); }
    }

    async function muatKatalogProduk() {
        const infoAkses = document.getElementById('status-akses');
        const kontenAdmin = document.getElementById('konten-admin');
        const tbody = document.getElementById('list-produk');
        const adminTerpilih = document.getElementById("pilih-admin").value;

        infoAkses.style.display = 'block';
        kontenAdmin.style.display = 'none';
        
        try {
            let query = supabaseClient.from('produk').select('*').order('id', { ascending: false });
            if (adminTerpilih) query = query.eq('pemilik', adminTerpilih);

            const { data: produkList, error: dbError } = await query;
            if (dbError) throw dbError;

            tbody.innerHTML = '';
            if (produkList && produkList.length > 0) {
                produkList.forEach(p => {
                    const hBeli = Number(p.harga_beli) || 0; 
                    const hJual = Number(p.harga) || 0;
                    const diskon = Number(p.diskon) || 0;
                    const hJualNet = hJual - (hJual * (diskon / 100));
                    const untung = hJualNet - hBeli;
                    const warna = untung >= 0 ? "green" : "red";

                    tbody.innerHTML += `<tr>
                        <td><input type="text" value="${p.nama}" onchange="updateData(${p.id}, 'nama', this.value)" style="width:90%"></td>
                        <td class="text-right"><input type="number" value="${hBeli}" onchange="updateData(${p.id}, 'harga_beli', this.value)" style="width:80px"></td>
                        <td class="text-right"><input type="number" value="${hJual}" onchange="updateData(${p.id}, 'harga', this.value)" style="width:80px"></td>
                        <td class="text-center"><input type="number" value="${diskon}" onchange="updateData(${p.id}, 'diskon', this.value)" style="width:40px"></td>
                        <td class="text-right"><b style="color: ${warna};">Rp ${untung.toLocaleString('id-ID')}</b></td>
                        <td class="text-center"><button onclick="hapusProduk(${p.id}, '${p.nama}')" style="color:red; cursor:pointer;">Hapus</button></td>
                    </tr>`;
                });
                infoAkses.style.display = 'none';
                kontenAdmin.style.display = 'block';
            } else {
                infoAkses.innerText = 'Tidak ada produk ditemukan.';
            }
        } catch (error) { infoAkses.innerHTML = `<div class="pesan-error">Error: ${error.message}</div>`; }
    }

    async function hapusProduk(id, nama) {
        if (!confirm(`Yakin ingin menghapus produk "${nama}"?`)) return;
        try {
            const { error } = await supabaseClient.from('produk').delete().eq('id', id);
            if (error) throw error;
            await muatKatalogProduk();
        } catch (error) { alert("Gagal: " + error.message); }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await isiDropdownAdmin();
        await muatKatalogProduk();
    });
</script>
</body>
</html>
