<h3>Panel Admin - Kelola Barang</h3>
<a href="/" style="text-decoration:none; color:blue;">&larr; Kembali ke Home</a>

<div id="admin-product-list" style="margin-top: 20px;"></div>

<style>
    .product-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 10px;
        background: #f9f9f9;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        align-items: center;
    }
    .product-card h4 { margin: 0; grid-column: 1 / -1; color: #333; }
    input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
    button { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
</style>

<script>
let products = JSON.parse(localStorage.getItem('allProducts')) || [];

function renderAdmin() {
    const list = document.getElementById('admin-product-list');
    list.innerHTML = products.map(p => {
        const modal = parseFloat(p.hargaModal) || 0;
        const jual = parseFloat(p.hargaJual) || 0;
        const diskon = parseFloat(p.diskon) || 0; // dalam persen
        const hargaSetelahDiskon = jual - (jual * (diskon / 100));

        return `
        <div class="product-card">
            <h4>${p.nama}</h4>
            <label>Modal: <input type="number" value="${modal}" onchange="updateBarang('${p.id}', 'hargaModal', this.value)"></label>
            <label>Jual: <input type="number" value="${jual}" onchange="updateBarang('${p.id}', 'hargaJual', this.value)"></label>
            <label>Diskon (%): <input type="number" value="${diskon}" onchange="updateBarang('${p.id}', 'diskon', this.value)"></label>
            <label>Setelah Diskon: <br> <strong>Rp ${hargaSetelahDiskon.toLocaleString()}</strong></label>
            <label>Stok: <input type="number" value="${p.stok}" onchange="updateBarang('${p.id}', 'stok', this.value)"></label>
            <button onclick="hapusBarang('${p.id}')">Hapus</button>
        </div>
        `;
    }).join('');
}

function updateBarang(id, field, value) {
    const index = products.findIndex(p => p.id == id);
    products[index][field] = value;
    localStorage.setItem('allProducts', JSON.stringify(products));
    renderAdmin(); // Re-render agar harga setelah diskon update otomatis
}

function hapusBarang(id) {
    if(confirm('Yakin ingin menghapus barang ini?')) {
        products = products.filter(p => p.id != id);
        localStorage.setItem('allProducts', JSON.stringify(products));
        renderAdmin();
    }
}

renderAdmin();
</script>
