<form id="checkoutForm">
    <input type="text" id="nama" placeholder="Nama Lengkap" required>
    <input type="text" id="wa" placeholder="No. WA/HP" required>
    <textarea id="alamat" placeholder="Alamat Lengkap" required></textarea>
    <button type="submit">Kirim Pesanan</button>
</form>

<script>
document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        nama: document.getElementById('nama').value,
        wa: document.getElementById('wa').value,
        alamat: document.getElementById('alamat').value,
        pesanan: localStorage.getItem('cart'), // Data keranjang
        tanggal: new Date().toLocaleString()
    };

    // Kirim ke Google Script
    const response = await fetch("URL_SCRIPT_ANDA", {
        method: "POST",
        body: JSON.stringify(data)
    });
    alert("Pesanan berhasil dikirim!");
});
</script>
