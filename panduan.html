<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukasi Duta Terang</title>
    <style>
        :root { --primary: #00bcd4; --bg: #f5f6f8; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Navbar */
        .nav { background: var(--primary); padding: 15px; color: white; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav a { text-decoration: none; color: white; font-size: 18px; font-weight: bold; margin-right: 15px; }

        .container { padding: 10px; max-width: 800px; margin: auto; }
        h2 { font-size: 14px; margin: 25px 5px 15px; border-left: 4px solid var(--primary); padding-left: 10px; text-transform: uppercase; color: #555; }

        /* Grid System - 3 Kolom */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-items: stretch; }

        /* Card Styling */
        .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; cursor: pointer; height: 100%; border: 1px solid #eee; transition: 0.2s; }
        .card:active { transform: scale(0.96); }
        
        .thumb { width: 100%; height: 75px; background: #222; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .play-btn { position: absolute; color: white; font-size: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        .card-body { padding: 8px 5px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .card-title { font-size: 10px; font-weight: bold; line-height: 1.3; color: #222; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 90vh; border-radius: 15px; overflow-y: auto; padding: 20px; position: relative; }
        .close-modal { position: sticky; top: 0; float: right; background: #f0f0f0; border: none; padding: 8px 12px; border-radius: 50%; font-weight: bold; cursor: pointer; z-index: 10; }
        .modal-body { line-height: 1.7; font-size: 14px; margin-top: 15px; white-space: pre-wrap; color: #444; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Tombol Load More */
        .btn-more { display: block; width: 100%; margin: 20px 0; padding: 12px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-more:hover { background: var(--primary); color: #fff; }

        .loading { text-align: center; padding: 50px; color: #888; font-weight: bold; }
        .hide { display: none; }
        marquee { background: #fff; padding: 5px; font-size: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="https://vesatukio.github.io/jualled/">⬅</a>
    <span style="font-weight: bold;">PUSAT EDUKASI DUTA TERANG</span>
</nav>

<marquee scrollamount="5">Tutorial Servis LED, Audio System, dan Update Sparepart Terbaru Setiap Hari!</marquee>

<div class="container">
    <div id="loader" class="loading">Sinkronisasi Database...</div>

    <!-- Section Video -->
    <section id="sec-video" class="hide">
        <h2>📽️ VIDEO TUTORIAL</h2>
        <div id="grid-video" class="grid"></div>
        <button id="more-video" class="btn-more" onclick="showAll('video')">Tampilkan Video Lainnya...</button>
    </section>

    <!-- Section Artikel -->
    <section id="sec-artikel" class="hide">
        <h2>📖 ARTIKEL TEKNIK</h2>
        <div id="grid-artikel" class="grid"></div>
        <button id="more-artikel" class="btn-more" onclick="showAll('artikel')">Tampilkan Artikel Lainnya...</button>
    </section>
</div>

<div id="modal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div id="modal-ui"></div>
    </div>
</div>

<script>
    const URL_VIDEO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAd4pEtxlxD_EaVYx4L_vhhz0U3WmPYNxOXENt1NiTEGRZjpoIECzIRQSQDYhmjGQQYGN6VaMUuQ-C/pub?gid=287695265&single=true&output=csv";
    const URL_ARTIKEL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRAd4pEtxlxD_EaVYx4L_vhhz0U3WmPYNxOXENt1NiTEGRZjpoIECzIRQSQDYhmjGQQYGN6VaMUuQ-C/pub?gid=514579729&single=true&output=csv";
    
    let dbVideo = [];
    let dbArtikel = [];

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.filter(l => l.trim() !== '').map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"' && line[i+1] === '"') { current += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
                else { current += char; }
            }
            result.push(current);
            return result;
        });
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function loadData() {
        try {
            const [resVid, resArt] = await Promise.all([
                fetch(URL_VIDEO).then(r => r.text()),
                fetch(URL_ARTIKEL).then(r => r.text())
            ]);

            const rowsVid = parseCSV(resVid).slice(1);
            const rowsArt = parseCSV(resArt).slice(1);

            // Simpan data ke database local
            rowsVid.forEach((cols) => {
                if(cols.length < 2) return;
                dbVideo.push({ judul: cols[1], isi: cols[2], link: cols[3], tgl: cols[4], kat: cols[5], vidId: getYoutubeId(cols[3]) });
            });

            rowsArt.forEach((cols) => {
                if(cols.length < 2) return;
                dbArtikel.push({ judul: cols[1], isi: cols[2], tgl: cols[4], kat: cols[5] });
            });

            renderGrid('video', 12);
            renderGrid('artikel', 12);

            document.getElementById('loader').classList.add('hide');
            document.getElementById('sec-video').classList.remove('hide');
            document.getElementById('sec-artikel').classList.remove('hide');

            // Sembunyikan tombol jika data kurang dari 12
            if(dbVideo.length <= 12) document.getElementById('more-video').classList.add('hide');
            if(dbArtikel.length <= 12) document.getElementById('more-artikel').classList.add('hide');

        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat data.";
        }
    }

    function renderGrid(type, limit) {
        const grid = document.getElementById(`grid-${type}`);
        const data = type === 'video' ? dbVideo : dbArtikel;
        let html = "";

        const itemsToShow = data.slice(0, limit);

        itemsToShow.forEach((item, i) => {
            if(type === 'video') {
                html += `
                <div class="card" onclick="openContent('video', ${i})">
                    <div class="thumb">
                        <img src="https://img.youtube.com/vi/${item.vidId}/mqdefault.jpg">
                        <div class="play-btn">▶</div>
                    </div>
                    <div class="card-body"><div class="card-title">${item.judul}</div></div>
                </div>`;
            } else {
                html += `
                <div class="card" onclick="openContent('artikel', ${i})">
                    <div class="thumb" style="background:var(--primary)">
                        <span style="font-size:28px; color:white;">📄</span>
                    </div>
                    <div class="card-body"><div class="card-title">${item.judul}</div></div>
                </div>`;
            }
        });
        grid.innerHTML = html;
    }

    function showAll(type) {
        renderGrid(type, 999); // Tampilkan semua
        document.getElementById(`more-${type}`).classList.add('hide'); // Sembunyikan tombol
    }

    function openContent(type, index) {
        const item = type === 'video' ? dbVideo[index] : dbArtikel[index];
        const ui = document.getElementById('modal-ui');
        
        if(type === 'video') {
            ui.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${item.vidId}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
                </div>
                <h3 style="margin-top:15px; color:var(--primary); font-size:16px;">${item.judul}</h3>
                <div class="modal-body">${item.isi}</div>`;
        } else {
            ui.innerHTML = `
                <h2 style="color:var(--primary); font-size:18px;">${item.judul}</h2>
                <div style="font-size:12px; color:#999;">📅 ${item.tgl} | 🏷️ ${item.kat}</div>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <div class="modal-body">${item.isi}</div>`;
        }
        document.getElementById('modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('modal-ui').innerHTML = '';
    }

    window.onload = loadData;
</script>
</body>
</html>
