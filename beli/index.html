<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Duta Terang</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Pencarian & Filter */
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .filter-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .btn-filter { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; }
        .btn-filter.active { background: #2c3e50; color: white; border-color: #2c3e50; }

        /* Grid System */
        .produk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 992px) { .produk-grid { grid-template-columns: repeat(4, 1fr); } }

        .produk-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .produk-img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; background: #eee; }
        .nama { font-weight: 600; font-size: 13px; margin: 10px 0 5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .harga { color: #555; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" class="search-box" id="search-input" placeholder="Cari nama produk..." oninput="filterData()">
    <div class="filter-wrapper" id="kategori-list">
        <button class="btn-filter active" onclick="setKategori('Semua', this)">Semua</button>
    </div>
    <div class="produk-grid" id="produk-grid"></div>
</div>

<script>
    const SUPABASE_URL = 'https://opgeeqnucxrdqcgwcuge.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wZ2VlcW51Y3hyZHFjZ3djdWdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTgzODAsImV4cCI6MjA5NDU5NDM4MH0.yT10QOFErxHbTL8X-QOUQ8EydcJuLpStCbd8ucfTJr8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let semuaProduk = [];
    let kategoriAktif = 'Semua';

    async function ambilData() {
        const { data } = await supabaseClient.from('produk').select('nama, harga_beli, gambar1, kategori');
        semuaProduk = data;
        
        // Render kategori unik
        const kategoriList = [...new Set(data.map(p => p.kategori).filter(Boolean))];
        const wrapper = document.getElementById('kategori-list');
        kategoriList.forEach(kat => {
            wrapper.innerHTML += `<button class="btn-filter" onclick="setKategori('${kat}', this)">${kat}</button>`;
        });
        
        renderProduk(semuaProduk);
    }

    function setKategori(kat, btn) {
        kategoriAktif = kat;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        filterData();
    }

    function filterData() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = semuaProduk.filter(p => {
            const matchKategori = (kategoriAktif === 'Semua' || p.kategori === kategoriAktif);
            const matchSearch = p.nama.toLowerCase().includes(query);
            return matchKategori && matchSearch;
        });
        renderProduk(filtered);
    }

    function renderProduk(data) {
        const grid = document.getElementById('produk-grid');
        grid.innerHTML = data.map(p => `
            <div class="produk-card">
                <img src="${p.gambar1 || 'https://via.placeholder.com/150'}" class="produk-img" alt="${p.nama}">
                <span class="nama">${p.nama}</span>
                <span class="harga">Rp ${Number(p.harga_beli).toLocaleString('id-ID')}</span>
            </div>
        `).join('');
    }

    ambilData();
</script>
</body>
</html>
